<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        /* 导航栏 */
        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .navbar .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .navbar ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            transition: color 0.3s;
        }
        .navbar a:hover {
            color: #3498db;
        }
        /* 主体容器 */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 2rem;
        }
        /* 文章卡片 */
        .post-card {
            background: white;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        .post-card:hover {
            transform: translateY(-3px);
        }
        .post-title {
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        .post-date {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .post-excerpt {
            color: #555;
        }
        /* 侧边栏 */
        .sidebar {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            height: fit-content;
        }
        .sidebar h3 {
            color: #2c3e50;
            margin-bottom: 1rem;
            border-bottom: 2px solid #3498db;
            padding-bottom: 0.5rem;
        }
        .sidebar p {
            margin-bottom: 1rem;
        }
        /* 页脚 */
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">我的博客</div>
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">文章</a></li>
                <li><a href="#">关于我</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主体内容 -->
    <div class="container">
        <!-- 文章列表 -->
        <div class="main-content">
            <div class="post-card">
                <h2 class="post-title">
                    <a href="article1.html" style="color: inherit; text-decoration: none;">
                        第一篇博客：欢迎来到我的小站
                    </a>
                </h2>
                <div class="post-date">2026年4月22日</div>
                <p class="post-excerpt">
                    终于把个人网站搭起来啦！用 GitHub Pages + 自定义域名，过程有点折腾，但看到页面正常显示的时候，成就感满满。
                    接下来会在这里记录我的学习心得、生活日常，欢迎常来看看~
                </p>
            </div>
        </div>

        <!-- 侧边栏 -->
        <div class="sidebar">
            <h3>关于我</h3>
            <p> 你好！我是一名正在学习编程的新手，喜欢记录生活和学习中的点滴。</p>
            <p> 目前正在学习前端和建站相关知识，这个博客就是我的第一个小作品~</p>
            
            <h3>联系方式</h3>
            <p> 邮箱：example@email.com</p>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <p>&copy; 2026 我的个人博客 | Powered by GitHub Pages</p>
    </footer>
</body>
</html>
