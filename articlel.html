<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【文章标题】- 我的博客</title>
    <link rel="stylesheet" href="style.css"> <!-- 引用全局样式，和首页保持一致 -->
</head>
<body>
    <!-- 导航栏（和首页完全一样，复制粘贴即可） -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">我的博客</div>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="#">文章</a></li>
                <li><a href="#">关于我</a></li>
            </ul>
        </div>
    </nav>

    <!-- 文章主体 -->
    <div class="container">
        <div class="main-content">
            <div class="post-card">
                <h1 class="post-title">【在这里写你的文章标题】</h1>
                <div class="post-date">2026年X月X日</div>
                <div class="post-content">
                    <p>在这里写你的正文内容，分段就用<p>标签包裹，比如：</p>
                    <p>这是文章的第一段，写点你想说的话~</p>
                    <p>这是文章的第二段，可以加一些换行、加粗等格式。</p>
                    <p><strong>加粗文字</strong>：用来强调重点内容。</p>
                    <p>如果想加图片，用这个格式：<br>
                    <img src="你的图片地址.jpg" alt="图片说明" style="max-width:100%; border-radius:8px;">
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚（和首页完全一样） -->
    <footer>
        <p>&copy; 2026 我的个人博客 | Powered by GitHub Pages</p>
    </footer>
</body>
</html>
